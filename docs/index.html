<script>
const CATS = {"Q": "Questions", "F": "Questions to ask"};
const ROUNDS = {"1": "R1 · Recruiter Screen", "2": "R2 · Hiring Manager", "3": "R3 · Analytics Case", "4": "R4 · Cross-functional Panel"};
const ROUNDMETA = {"1": {"who": "Recruiter", "goal": "Fit, background & motivation", "minutes": 30, "count": 6, "focus": "Background, motivation, logistics"}, "2": {"who": "Marketing Ops Leader", "goal": "Experience deep-dive + why Twilio/Segment", "minutes": 45, "count": 8, "focus": "Experience, ownership, strategy"}, "3": {"who": "Senior MOps / RevOps", "goal": "Funnel analysis, measurement, prioritization", "minutes": 60, "count": 8, "focus": "SQL, funnel, attribution, judgment"}, "4": {"who": "Marketing + Sales/RevOps + peer", "goal": "Collaboration, behavioral, influence", "minutes": 150, "count": 10, "focus": "Partnership, behavioral, communication"}};
const RKEYS = Object.keys(ROUNDS).map(Number);
const DATA = [{"id": "Q1", "cat": "Q", "q": "Tell me about yourself.", "rounds": [1, 2], "status": "todo", "st": "~90 seconds. Build a marketing-operations throughline that lands on this strategy-and-ops role — lead with impact on revenue, not a tool list.", "ai": "I'm a marketing operations and strategy person with about seven years in B2B SaaS. I started as a Marketing Ops Analyst at Zendesk running reporting and campaign ops, then moved into ownership as a Marketing Ops Manager at Asana, where I built our first multi-touch attribution model. For the last two-and-a-half years I've been Senior Marketing Ops Manager at Amplitude, owning the funnel model end to end — I rebuilt lead scoring and routing and took our MQL-to-SQL conversion from 18% to 26%. What draws me to this role is that it's explicitly strategy *and* operations: not just running the machine, but using the funnel data to decide where marketing should invest. That's the direction I've been growing toward, and doing it for Segment's motion is exactly the next step I want.", "bp": "~7 yrs B2B SaaS marketing ops\nZendesk (reporting) → Asana (built attribution) → Amplitude (own the funnel)\nAmplitude: MQL→SQL 18%→26% via lead scoring + routing\nWhy this role: strategy + ops, not just running the machine", "fu": [{"q": "Can you give me the 30-second version?", "st": "Compress ruthlessly — one line each on what you do, your best proof, and the fit.", "ai": "Seven years in B2B SaaS marketing ops; I've moved from reporting to owning the funnel — most recently taking MQL-to-SQL from 18% to 26% at Amplitude — and I want the strategy-and-ops scope this role has."}, {"q": "What pulled you from pure ops toward strategy?", "st": "Show it was a deliberate pull toward the decision, not away from ops.", "ai": "I kept finding the interesting decision wasn't building the report, it was what to do about it — where to reallocate spend. Once I was making those calls and defending them to leadership, I knew that's the layer I wanted to own."}], "grp": "intro"}, {"id": "Q2", "cat": "Q", "q": "What's your biggest weakness?", "rounds": [2, 4], "status": "todo", "st": "Pick a real, non-disqualifying weakness and walk the arc: behaviour → self-awareness → fix → result. Avoid humble-brags.", "ai": "In situations where I had a clean dataset and a clear answer, I used to jump straight to the recommendation and under-invest in walking stakeholders through how I got there. It made me look like I was handing down conclusions rather than building shared understanding, and a couple of times a solid recommendation stalled because Sales didn't trust a number they hadn't seen derived. So I've learned to be cognizant of this and no longer lead with just the conclusion. Instead, I now bring the funnel logic and the assumptions up front, and I pressure-test the number with the partner team before I present it. The result is that my recommendations land with buy-in — my last two funnel reviews were adopted without the usual back-and-forth on whether the data was right.", "bp": "Weakness: jumped to the recommendation, skipped the derivation\nCost: Sales distrusted numbers they hadn't seen built\nFix: show the funnel logic + assumptions, pressure-test with partners first\nResult: recommendations adopted with buy-in", "fu": [{"q": "How do you know that's actually improved?", "st": "Give concrete evidence of the change, not a claim.", "ai": "My last two funnel reviews were adopted without the usual back-and-forth on whether the data was right — Sales trusted the numbers because I'd walked them through the logic first."}, {"q": "Does showing all the work ever slow you down?", "st": "Show you calibrate — you don't over-explain everything.", "ai": "A little, so I calibrate — for a routine read I keep it brief; I only front-load the full derivation when the recommendation is consequential or a partner is likely to push back."}], "grp": "behavioral"}, {"id": "Q3", "cat": "Q", "q": "What's your biggest strength?", "rounds": [2], "status": "todo", "st": "Pick the strength this role needs most — turning funnel data into a prioritization decision — and prove it with a short story.", "ai": "My biggest strength is translating messy funnel data into a clear decision about where marketing should spend — I'm equally comfortable in the SQL and in the room with leadership. At Amplitude our pipeline was flat and the team wanted to add spend across the board. Instead of guessing, I broke the funnel down by source and stage, found that paid was filling the top but converting far worse than partner and content at the MQL-to-SQL step, and recommended we reallocate rather than add budget. We did, and conversion moved from 18% to 26% without more spend. The strength isn't the analysis for its own sake — it's turning it into a defensible 'do this, not that' that leadership can act on. That's the core of this role.", "bp": "Strength: funnel data → a clear 'invest here, not there' decision\nComfortable in the SQL and with leadership\nAmplitude: found paid converted worse → reallocated, not added spend\nMQL→SQL 18%→26% with no extra budget", "fu": "What's a strength you're still building?", "grp": "behavioral"}, {"id": "Q4", "cat": "Q", "q": "Why do you want this role at Twilio / Segment?", "rounds": [1, 2], "status": "todo", "st": "Show you understand Segment's motion (a CDP with both self-serve and sales-led) and tie it to the strategy-and-ops scope. Lead with the problem, not the brand.", "ai": "Three reasons. First, the scope is exactly where I've been heading — this role is strategy *and* operations, owning the funnel analysis and then using it to prioritize where marketing invests, which is the decision-making layer I want to own, not just the plumbing. Second, Segment is a genuinely interesting funnel problem: a CDP with both a self-serve motion and an enterprise sales motion, so the marketing funnel isn't one clean path — measuring and prioritizing across both is a real challenge I'd find meaningful. Third, the data maturity: Segment's whole product is about customer data, so I'd be doing marketing measurement in a place that takes data seriously, at real scale. That combination — a decision-making role, a hard multi-motion funnel, and a data-serious company — is why this is the one I want.", "bp": "① Scope = strategy + ops: own the invest-here decision, not just plumbing\n② Segment's hybrid self-serve + sales funnel = a real measurement challenge\n③ Data-serious company (a CDP) at scale\nWant the decision layer, not just the machine", "fu": "What would you want to dig into first?\nWhat do you see as the hard part of marketing ops here?", "grp": "intro"}, {"id": "Q5", "cat": "Q", "q": "Out of all the candidates, why should we hire you?", "rounds": [2, 4], "status": "todo", "st": "Name the specific combination they get. Surface the strategy side, since many ops candidates are execution-only.", "ai": "You'd get someone who is genuinely both halves of this role. A lot of marketing ops people are strong at the execution — the Marketo builds, the routing, the dashboards — and I am, but I also make the prioritization call and defend it to leadership, which is rarer. I've done the exact motion this role needs: at Amplitude I used funnel analysis to reallocate marketing investment and moved MQL-to-SQL from 18% to 26% without adding spend. I'm hands-on in SQL and Salesforce, so I'm not dependent on a data team to answer a question. And because I've owned attribution across a mixed funnel before, Segment's self-serve-plus-sales motion isn't new terrain for me. Execution depth, a real strategy track record, and self-sufficiency in the data — that's the combination I'd bring.", "bp": "Both halves: execution depth AND the prioritization call\nProven: reallocated spend → MQL→SQL 18%→26%\nSelf-sufficient in SQL + Salesforce (no data-team dependency)\nDone attribution across a mixed funnel already", "fu": "Where would you add value fastest?", "grp": "intro"}, {"id": "Q6", "cat": "Q", "q": "What's your biggest professional achievement?", "rounds": [2, 3], "status": "todo", "st": "Pick the achievement most relevant — the Amplitude MQL→SQL turnaround — with real numbers and your specific role vs the team.", "ai": "Taking Amplitude's MQL-to-SQL conversion from 18% to 26% over about three quarters. When I picked up the funnel, marketing was generating plenty of MQLs but Sales was rejecting most of them, and the two teams blamed each other. I rebuilt it from the data: I audited the funnel in SQL, found that lead scoring was rewarding activity that didn't predict a real opportunity, and that routing was slow enough that hot leads went cold. I redesigned the scoring model against what actually converted, tightened routing SLAs in Salesforce, and — the part that mattered most — got Sales to co-own the new definition so they trusted it. I owned the analysis, the scoring model, and the Salesforce implementation; RevOps partnered on routing and Sales leadership on the definition. The eight-point lift became one of the biggest inputs to pipeline that year.", "bp": "Amplitude MQL→SQL 18%→26% over ~3 quarters\nProblem: MQLs high but Sales rejected them; teams blamed each other\nDiagnosed in SQL: scoring rewarded non-predictive activity; routing too slow\nRebuilt scoring + routing SLAs; got Sales to co-own the definition\nMe: analysis, model, SFDC · Team: RevOps routing, Sales definition", "fu": [{"q": "What was YOUR part versus the team's?", "st": "Be specific about what YOU owned; vague 'we' invites doubt.", "ai": "I owned the analysis, the scoring model, and the Salesforce build. RevOps partnered on routing mechanics and Sales leadership on the SQL definition — but the diagnosis and the model were mine."}, {"q": "How did you get Sales to trust the new definition?", "st": "Emphasize co-ownership and proof, not persuasion.", "ai": "I had them co-own it — I brought the data on which leads their reps actually closed, let them shape the definition, and piloted with one team before rolling out. Ownership plus proof beat me dictating it."}, {"q": "How did you define an SQL exactly?", "st": "Give a crisp, agreed definition — show it wasn't arbitrary.", "ai": "A lead that met the agreed firmographic-fit bar and showed a genuine buying signal, accepted by Sales within the routing SLA. The key was Sales agreeing to the bar up front, so acceptance wasn't arbitrary."}], "grp": "experience"}, {"id": "Q7", "cat": "Q", "q": "Why are you looking to leave Amplitude?", "rounds": [1, 2], "status": "todo", "st": "Voluntary, forward-looking. Never bitter. Frame it as growth toward the strategy scope this role offers.", "ai": "I've genuinely valued my time at Amplitude — I'm proud that I rebuilt the funnel and moved conversion meaningfully, and I'd happily have my manager as a reference. But I've grown about as far as the role allows: I own the operations and I influence strategy, but the strategy ownership isn't formally mine, and the funnel is a relatively single-motion one. I'm looking for a role where prioritizing marketing investment is explicitly the job, on a harder, multi-motion funnel — which is exactly this role. I'd rather make a deliberate move toward that next step than stay comfortable, and that's why I'm here.", "bp": "Voluntary — proud of the work, manager as reference\nGrown as far as the role allows: influence strategy but don't own it\nWant: strategy ownership + a harder multi-motion funnel\nDeliberate move toward exactly this role's scope", "fu": "Are you exploring other roles right now?\nWhat would keep you somewhere long-term?", "grp": "intro"}, {"id": "Q8", "cat": "Q", "q": "Where do you see yourself in five years?", "rounds": [2], "status": "todo", "st": "Talk about the work and impact, not a title. Name skills this role uniquely builds, and signal you'll stay.", "ai": "In five years I want to be owning marketing strategy and operations at a level where I'm shaping how a whole go-to-market org decides where to invest — turning funnel and customer data into the plan, not just measuring it after the fact. To get there I want to sharpen skills this role uniquely builds: prioritization across a genuinely mixed self-serve-and-sales funnel, measurement at Segment's data scale, and the cross-functional influence to get marketing, sales, and finance aligned on one funnel. Honestly, I'd want to grow into that here — this is the kind of place where that expertise compounds, and I'd rather go deep and build something lasting than keep moving.", "bp": "Own GTM strategy + ops: shape where the org invests\nSkills to build here: mixed-funnel prioritization, measurement at scale, cross-functional influence\nGrow into it long-term, not keep switching", "fu": "What kind of problem would you most want to own?", "grp": "intro"}, {"id": "Q9", "cat": "Q", "q": "Tell me about a time a stakeholder was upset with you.", "rounds": [4], "status": "todo", "st": "Behavioral (CARL). Own it, fix it, name the lesson — no blame. Marketing ops lives between teams, so pick a cross-functional friction.", "ai": "(Context) At Amplitude, our VP of Marketing was frustrated when I recommended pausing a channel her team had championed — my funnel analysis showed it drove volume but almost no qualified pipeline, and she felt I was undercutting her team without warning. (Action) Rather than defend the analysis, I owned that I'd dropped the recommendation into a leadership deck before walking her through it privately, which was my mistake. I sat down with her, showed the source-level conversion data, and reframed it as reallocating her budget to her better-converting channels, not cutting it. We also agreed I'd preview any channel-level call with the owner first. (Result) She backed the reallocation, and it contributed to the conversion lift. (Learning) I learned that in ops the analysis is the easy part — the sequence of who hears it first is what determines whether it lands.", "bp": "VP Marketing upset: I recommended pausing her channel in a deck, no heads-up\nOwned the process mistake (not the analysis)\nWalked her through source-level data; reframed as reallocation, not a cut\nAgreed to preview channel calls with owners first\nLesson: in ops, the sequencing of who hears it first is everything", "fu": "What would you do differently next time?", "grp": "behavioral"}, {"id": "Q10", "cat": "Q", "q": "How did you hear about this opening?", "rounds": [1], "status": "todo", "st": "Signal intent and research, not a spray-and-pray apply. A referral or a specific reason beats a job board.", "ai": "[Fill in the true source.] A strong version: a former colleague from Asana who's now on the Twilio marketing team flagged it and said the strategy-and-ops scope was real, not just a title — which is exactly what I've been looking for, so I dug in. If it was a job board, pivot to why it stood out: it's one of the few marketing ops roles that explicitly owns prioritization, not just execution.", "bp": "[Fill in real source — referral is best]\nIf referral: a former colleague now at Twilio flagged the real scope\nIf job board: it stood out as owning prioritization, not just execution", "grp": "intro"}, {"id": "Q11", "cat": "Q", "q": "Describe your dream job.", "rounds": [2], "status": "todo", "st": "Connect the 'dream' to things that are actually true of this role, so it reads as aligned.", "ai": "My dream job is owning the funnel for a company that takes data seriously — where I get to do the real analysis, make the call on where marketing should invest, and have that call actually shape the plan, not just inform a report nobody acts on. I like being close enough to the data to answer my own questions, and senior enough that the answer matters. That's honestly a fair description of this role, which is part of why I'm here.", "bp": "Own the funnel at a data-serious company\nDo the analysis AND make the investment call\nClose to the data, senior enough that it matters", "grp": "intro"}, {"id": "Q12", "cat": "Q", "q": "What kind of work environment do you do your best work in?", "rounds": [1, 2], "status": "todo", "st": "Align honestly with a data-driven, cross-functional culture. Don't fake it.", "ai": "I do my best work where decisions get settled by looking at the funnel together rather than by whoever argues loudest — a data-driven culture with enough cross-functional trust that marketing, sales, and ops can disagree and still land on one number. I also like autonomy on the how: give me the outcome we're trying to move and access to the data, and I'll figure out the analysis and bring a recommendation. From what I understand of how Segment operates, that's a good match.", "bp": "Data settles decisions, not the loudest voice\nCross-functional trust to disagree and align on one number\nAutonomy on the how; give me the outcome + the data", "grp": "intro"}, {"id": "Q13", "cat": "Q", "q": "Tell me about the toughest decision you made in the last six months.", "rounds": [3, 4], "status": "todo", "st": "Behavioral (CARL). Show judgment weighing data and organizational reality. A reallocation or a build-vs-fix call works.", "ai": "(Context) At Amplitude I had to decide whether to keep patching our aging attribution setup or rebuild it mid-quarter, knowing a rebuild would leave us partly blind on reporting for a few weeks right before a board update. (Action) I didn't want to decide on instinct, so I quantified it: I estimated how much the bad attribution was mis-crediting channels — enough that we were likely over-investing in one source by a real margin — and weighed that against the reporting gap. I chose to rebuild, but de-risked it by keeping the old model running in parallel so leadership still had numbers during the transition. (Result) The rebuilt model shifted how we credited two channels and directly informed the next quarter's budget split. (Learning) The tough part wasn't the analysis — it was accepting a short-term reporting gap for a more correct long-term picture, and the parallel-run made that defensible.", "bp": "Patch vs rebuild attribution mid-quarter, before a board update\nQuantified the cost of bad attribution (real mis-crediting)\nChose rebuild; de-risked by running old model in parallel\nShifted 2 channels' credit → informed next quarter's budget", "fu": "What would have changed your decision?", "grp": "behavioral"}, {"id": "Q14", "cat": "Q", "q": "What's your working style, especially across teams?", "rounds": [4], "status": "todo", "st": "Marketing ops leads through influence. Give concrete examples of how you align marketing, sales, and ops — not adjectives.", "ai": "I work through shared numbers rather than authority — I sit between marketing, sales, and RevOps, so my job is to make one version of the funnel everyone trusts and then use it to drive the conversation. Concretely, I start engagements by agreeing on definitions and a single source of truth before anyone argues about performance, because most cross-team fights are actually definition fights. I keep the funnel visible and current so we're all reacting to the same data. And when I bring a recommendation, I preview it with the affected team first so they're not blindsided in a room. That combination — shared definitions, one dashboard, no surprises — is how I get teams that don't report to me to move together.", "bp": "Lead through shared numbers, not authority\nAgree definitions + single source of truth first (most fights are definition fights)\nKeep the funnel visible and current\nPreview recommendations with affected teams — no surprises", "fu": "Tell me about a time that approach failed and what you did.", "grp": "behavioral"}, {"id": "Q15", "cat": "Q", "q": "Tell me about a time you disagreed with a decision.", "rounds": [4], "status": "todo", "st": "Behavioral (CARL). Push back with evidence, then commit — not that you 'won.'", "ai": "(Context) At Asana, leadership wanted to raise the MQL bar to send Sales fewer, higher-quality leads. My read of the data was that the bigger problem wasn't lead quality, it was routing speed — good leads were going cold before follow-up. (Action) Rather than just object, I proposed we test it: hold the bar steady but tighten routing SLAs for one segment, and compare conversion. I brought the time-to-first-touch data that suggested speed was the real lever, and framed it as 'let's find out cheaply before we shrink the top of the funnel.' (Result) The faster-routing segment converted better than the higher-bar approach would have, so we fixed routing first and raised the bar only modestly. Everyone aligned because the test decided it. (Learning) Disagreement lands best as a testable next step — I rarely need to win the argument if I can turn it into a small experiment.", "bp": "Leadership wanted to raise the MQL bar; data pointed at routing speed\nDidn't object — proposed a test: tighten routing SLAs for one segment\nBrought time-to-first-touch data; framed as 'find out cheaply'\nFaster routing won → fixed that first; test decided it", "fu": "What if the test had been inconclusive?", "grp": "behavioral"}, {"id": "Q16", "cat": "Q", "q": "How would your teammates describe you?", "rounds": [2], "status": "todo", "st": "Authentic; highlight being the trusted, data-grounded connector between teams. Hint at evidence.", "ai": "I think they'd say I'm the person who brings the number everyone actually trusts — that when there's a marketing-versus-sales debate about the funnel, I'm the neutral party who can settle it with data instead of opinion. Sales partners would say I make their lives easier by sending better-qualified leads and being honest when marketing's numbers are soft. And my marketing teammates would say I translate their work into revenue terms leadership respects. Trusted, data-grounded, and good at getting teams that disagree to align — that's what I'd want them to say.", "bp": "Brings the number everyone trusts; neutral in marketing-vs-sales debates\nSales: better-qualified leads, honest about soft numbers\nMarketing: translates their work into revenue terms\nTrusted connector across teams", "grp": "behavioral"}, {"id": "Q17", "cat": "Q", "q": "What would you focus on in your first 90 days?", "rounds": [2, 3], "status": "todo", "st": "Show a learn → find-leverage → deliver plan. Serve the funnel and the partners; don't promise a big rebuild on day one.", "ai": "First ~30 days: learn the funnel and the definitions — I'd map Segment's actual funnel across the self-serve and sales motions, learn how each stage is defined and instrumented, and meet the marketing, sales, and RevOps partners to understand where they trust the data and where they don't. Days 30–60: find the leverage — pick one high-confidence measurement gap or misallocation, and get a quick, credible win that builds trust in me and the numbers. Days 60–90: deliver and set direction — ship that fix, share the funnel view widely, and bring a prioritized point of view on where marketing's next dollar should go. The goal is an early, trusted win plus a data-backed prioritization, not a big-bang rebuild.", "bp": "0–30: map the mixed funnel + definitions; meet marketing/sales/RevOps\n30–60: one high-confidence gap or misallocation → quick credible win\n60–90: ship it, share the funnel view, bring a prioritization POV\nGoal: trusted early win + data-backed plan, not a big-bang rebuild", "fu": "What's the first metric you'd want to understand?", "grp": "intro"}, {"id": "Q18", "cat": "Q", "q": "What do you like to do outside of work?", "rounds": [1], "status": "todo", "st": "Be genuine; pick something showing curiosity or persistence, plus real personality. Keep it short.", "ai": "[Fill in with something real and specific — a good version signals curiosity or discipline, e.g. 'I got into amateur data-journalism side projects, scraping public datasets and making charts for fun,' or a hobby you genuinely invest in.] Keep it brief and human; this question is mostly a rapport and culture check.", "bp": "[Fill in a real hobby]\nPick one showing curiosity or discipline\nKeep it short + human", "grp": "intro"}, {"id": "Q19", "cat": "Q", "q": "What are your salary expectations?", "rounds": [1], "status": "todo", "st": "Deflect to a researched range and ask if the role fits it; don't anchor on your current number.", "ai": "I'm targeting something in the range of [Fill in your researched range for a mid-senior marketing ops/strategy role in this market], but I care most about the scope — this being a real strategy-and-ops role — and I'm confident we can find a number that works if it's the right fit. Could you share the band you have in mind for this level so I can make sure we're aligned?", "bp": "Give a researched range, not your current salary\nEmphasize scope/fit over the exact number\nAsk for their band for this level", "fu": "What's the band for this level?", "grp": "intro"}, {"id": "Q20", "cat": "Q", "q": "How do you measure marketing's impact on revenue?", "rounds": [3], "status": "todo", "st": "Core craft. Show a full picture: the funnel metric tree, attribution's role and limits, and leading vs lagging indicators. Have a point of view.", "ai": "I anchor on pipeline and revenue influenced, but I build the measurement as a funnel tree so we can see where marketing actually moves the number, not just a single attributed-revenue figure. At the top: volume by stage — leads, MQLs, SQLs, opportunities, closed-won — with stage-to-stage conversion so we can see where the funnel leaks. Alongside that, attribution to understand which sources and campaigns drive qualified pipeline, treating it as directional, not gospel — I use it to compare channels, not to hand out exact credit. And I separate leading indicators (MQL volume, conversion rate, velocity) from lagging ones (pipeline, revenue) so we can steer before the quarter closes. The honest version is that no single attribution model is 'true' — the value is a consistent framework everyone trusts enough to make decisions on.", "bp": "Anchor on pipeline / revenue influenced, built as a funnel tree\nStage volume + stage-to-stage conversion → find the leaks\nAttribution as directional (compare channels), not exact credit\nSeparate leading (MQL, conversion, velocity) vs lagging (pipeline, revenue)", "fu": "Where does attribution break down, and how do you handle that?\nHow do you handle marketing's role in a long enterprise sales cycle?", "grp": "craft"}, {"id": "Q21", "cat": "Q", "q": "Walk me through how you'd build or improve a marketing funnel model.", "rounds": [3], "status": "todo", "st": "Show a structured build: definitions → instrumentation → stage conversion → diagnosis → action. Concrete, not textbook.", "ai": "① Definitions first — I'd nail down what each stage actually means (what's an MQL, what's an SQL) with marketing and sales together, because an unagreed definition makes every downstream number worthless. ② Instrumentation — make sure each stage is tracked cleanly in Marketo/Salesforce and that timestamps are reliable, so conversion and velocity are trustworthy. ③ Build the stage-to-stage view — volume and conversion at each step, sliced by source and segment, so the leak is visible. ④ Diagnose — find the biggest, highest-value drop; usually it's one stage (say MQL-to-SQL) concentrated in one source. ⑤ Action and monitor — fix the biggest leak, set a baseline, and watch it. The model isn't the deliverable; the decision it enables is. I'd start by validating definitions and data quality, because most 'funnel problems' are really definition or tracking problems.", "bp": "1) Agree stage definitions with marketing + sales (or every number is worthless)\n2) Clean instrumentation in Marketo/SFDC + reliable timestamps\n3) Stage-to-stage conversion, sliced by source/segment\n4) Diagnose the biggest, highest-value leak\n5) Fix it, baseline, monitor — the decision is the deliverable", "fu": "What's the most common data-quality issue you hit?", "grp": "craft"}, {"id": "Q22", "cat": "Q", "q": "How do you approach multi-touch attribution?", "rounds": [3], "status": "todo", "st": "Show you understand attribution models AND their limits. The maturity signal is treating it as directional. Reference your real build.", "ai": "I treat attribution as a decision aid, not a truth machine. I'd start with the question we're trying to answer — usually 'which channels deserve more or less investment' — and pick the model that fits: a simple first/last touch is fine for quick reads, but for budget decisions I prefer a multi-touch model (like W-shaped) that credits the touches that actually move someone through the funnel. At Asana I built our first multi-touch model, and the biggest lesson was that the exact credit split matters less than consistency — as long as everyone uses the same model, the *relative* comparison between channels is what's decision-useful. I always pair it with the funnel-conversion view, because attribution tells you what got credit and conversion tells you what actually qualified — and I'm explicit with leadership about where the model is directional so no one over-reads a decimal point.", "bp": "Attribution = decision aid, not truth; start from the decision\nMulti-touch (e.g. W-shaped) for budget calls; first/last touch for quick reads\nAsana build: consistency > exact split — relative channel comparison is what's useful\nPair with conversion view; be explicit about where it's directional", "fu": "Single-touch vs multi-touch — when is each fine?", "grp": "craft"}, {"id": "Q23", "cat": "Q", "q": "Our MQL-to-SQL conversion just dropped 20% quarter over quarter. How do you diagnose it?", "rounds": [3, 4], "status": "todo", "st": "Analytics case. Show a structured path: is it real → segment → internal vs external → which stage → root cause. Don't jump to a fix.", "ai": "First, is it real? I'd check for a tracking or definition change — did lead scoring, routing rules, or the SQL definition change, or did a Salesforce field break? A surprising share of 'drops' are measurement artifacts. If it's real: I'd segment to localize it — by lead source, campaign, segment/region, and by sales team, because a drop concentrated in one slice points fast. Then internal vs external: did marketing change its mix (more top-of-funnel volume from a low-intent source dilutes conversion), did sales capacity or process change, or is it seasonality? Then I'd walk the specific transition — is it fewer MQLs accepted, or slower follow-up letting them go cold? I'd look at time-to-first-touch as a prime suspect. Then form one hypothesis from where it's concentrated and confirm it before acting. And I'd communicate early what I know and what I'm still checking, rather than guess loudly.", "bp": "1) Is it real? scoring/routing/definition change or broken SFDC field\n2) Segment: source, campaign, region, sales team\n3) Internal (mix shift, sales capacity) vs external (seasonality)\n4) Which transition — fewer accepted, or slower follow-up (check time-to-first-touch)\n5) One hypothesis → confirm before acting; communicate early", "fu": "Where would you look first, and why?\nHow do you rule out a mix-shift from a new campaign?", "grp": "craft"}, {"id": "Q24", "cat": "Q", "q": "How do you decide where marketing should invest — which levers to pull?", "rounds": [3], "status": "todo", "st": "This is the heart of the role. Show a prioritization framework grounded in the funnel: efficiency by channel, marginal return, and constraints — not a gut call.", "ai": "I prioritize by efficiency and marginal return against the funnel, not by what's loudest. First I look at each channel's full-funnel economics — not just cost per lead, but cost per qualified pipeline and per closed-won, because a cheap-lead channel that doesn't convert is expensive. Then I think at the margin: where does the next dollar do the most? A channel converting well but under-funded is usually a better bet than adding to a saturated one. I weigh constraints too — sales capacity to work the leads, and how fast a lever pays back. And I keep some budget for testing so we're not only optimizing the known. At Amplitude that framework is what led me to reallocate from paid into better-converting channels rather than add spend — and conversion moved eight points with the same budget. The discipline is that every dollar maps to a funnel stage and an expected return.", "bp": "Prioritize by efficiency + marginal return, not volume or noise\nFull-funnel economics: cost per qualified pipeline / closed-won, not per lead\nMarginal thinking: next dollar's best home; under-funded good converter > saturated one\nWeigh sales capacity + payback; reserve some test budget\nAmplitude: reallocated (not added) → +8 pts conversion", "fu": "How do you handle a channel leadership loves but the data doesn't?\nHow do you value a brand/long-payback channel in that framework?", "grp": "craft"}, {"id": "Q25", "cat": "Q", "q": "How do you manage and rationalize a martech stack (Marketo, Salesforce, etc.)?", "rounds": [3], "status": "todo", "st": "Show hands-on ownership plus a rationalization mindset (tools serve the funnel, not the reverse). Reference real tools.", "ai": "I treat the stack as infrastructure that serves the funnel, and I'm ruthless about whether each tool earns its keep. Day to day I own the core — Marketo for campaigns and scoring, Salesforce as the system of record, and the integration between them, which is where most data problems actually live. When I rationalize a stack, I start from the workflows we need (capture, score, route, nurture, report) and map tools to them; anything that's redundant, barely used, or creating a sync mess is a candidate to cut. At Amplitude I consolidated a couple of overlapping point tools that were duplicating data into Salesforce, which cleaned up our reporting and cut cost. The principle is that a smaller, well-integrated stack with clean data beats a big one with tools nobody trusts.", "bp": "Stack = infrastructure serving the funnel; every tool must earn its keep\nOwn the core: Marketo (campaigns/scoring) + Salesforce (system of record) + the integration\nRationalize from workflows (capture/score/route/nurture/report), cut redundant/unused\nAmplitude: consolidated overlapping tools → cleaner reporting + lower cost", "fu": "How do you keep Marketo and Salesforce data in sync and trustworthy?", "grp": "craft"}, {"id": "Q26", "cat": "Q", "q": "How would you design lead scoring and routing?", "rounds": [3], "status": "todo", "st": "Concrete craft tied to the resume. Score on what predicts conversion, route fast, and keep sales bought in. This is your Amplitude win.", "ai": "I score on what actually predicts a real opportunity, not on activity for its own sake. Concretely: I'd pull historical data on which attributes and behaviors correlated with becoming an SQL and then closing — firmographic fit plus genuine buying signals — and build the model against that, rather than rewarding email opens that don't predict anything. Then routing: get the qualified lead to the right rep fast, with tight SLAs, because speed-to-lead is often a bigger lever than the score itself. And critically, I involve sales in the scoring definition so they trust and actually work the leads — a model sales doesn't believe in is worthless. That's exactly what I did at Amplitude: rebuilding scoring against real conversion data and tightening routing took MQL-to-SQL from 18% to 26%. I'd also revisit the model regularly, since what predicts conversion drifts.", "bp": "Score on what predicts SQL + close (fit + real buying signals), not activity\nBuild the model from historical conversion data\nRoute fast — tight SLAs; speed-to-lead often beats the score\nInvolve sales in the definition (a model they distrust is worthless)\nAmplitude: this took MQL→SQL 18%→26%; revisit as predictors drift", "fu": "How do you handle sales complaining the leads are bad?", "grp": "craft"}, {"id": "Q27", "cat": "Q", "q": "How do you partner with Sales and RevOps on a shared funnel?", "rounds": [4], "status": "todo", "st": "Behavioral/craft. Marketing ops succeeds or fails on this relationship. Show shared definitions, shared metrics, and no surprises.", "ai": "The whole job runs on this relationship, so I invest in it deliberately. First, shared definitions and one funnel everyone reads the same way — the classic marketing-sales fight is really a definition fight, so I get agreement on what an MQL and SQL mean before we ever argue about performance. Second, shared accountability: I don't just throw leads over the wall, I track what happens after handoff and treat MQL-to-SQL as a joint metric marketing and sales both own. Third, no surprises — I preview any change to scoring, routing, or reporting with RevOps and sales leadership before it ships. At Amplitude that partnership is exactly what made the conversion turnaround stick: sales co-owned the new lead definition, so they actually worked the leads instead of rejecting them. When marketing and sales trust the same numbers, most of the friction disappears.", "bp": "Shared definitions + one funnel (most fights are definition fights)\nShared accountability: track post-handoff; MQL→SQL is a joint metric\nNo surprises: preview scoring/routing/reporting changes with RevOps + sales\nAmplitude: sales co-owned the definition → the turnaround stuck", "fu": "Tell me about a marketing-sales conflict you resolved.", "grp": "craft"}, {"id": "Q28", "cat": "Q", "q": "How comfortable are you in SQL? Walk me through an analysis you ran yourself.", "rounds": [3], "status": "todo", "st": "Prove hands-on depth. Concrete analysis, method, and what you did with the result — don't be vague.", "ai": "Very comfortable — I write my own SQL and build my own dashboards rather than waiting on a data team. A concrete example: at Amplitude, when MQL-to-SQL was low and marketing and sales were blaming each other, I went into the warehouse and joined lead, opportunity, and activity data to compute stage-to-stage conversion by lead source and by the lead-scoring attributes. The query showed two things: one source was flooding the top with leads that converted at a fraction of the rest, and high-scoring leads weren't actually converting better — which meant the score was broken. That analysis is what pointed me at rebuilding the scoring model and reallocating away from that source. I take an analysis all the way to a decision — it's not a dashboard for its own sake, it's the thing that tells us what to change.", "bp": "Hands-on: own SQL + dashboards, not waiting on a data team\nAmplitude: joined lead/opp/activity data → conversion by source + score attributes\nFound: one source converted far worse; high scores didn't convert better (score broken)\nDrove the scoring rebuild + reallocation — analysis → decision", "fu": "What's a SQL result that surprised you?\nWhere do you lean on a data team vs do it yourself?", "grp": "craft"}, {"id": "Q29", "cat": "Q", "q": "How do you turn an analysis into a recommendation leadership actually acts on?", "rounds": [3, 4], "status": "todo", "st": "The communication half of the role. Show you lead with the decision, quantify the stakes, and make it a clear choice — not a data dump.", "ai": "I lead with the decision, not the data. Leadership doesn't want a dashboard tour — they want 'here's what I think we should do and why.' So I open with the recommendation and the expected impact, then show just enough of the funnel logic to make it credible, and I frame it as a clear choice with the trade-off named — 'reallocate this budget and we likely gain X in qualified pipeline; keep it and we don't.' I quantify the stakes so the cost of inaction is visible, and I pre-socialize with the affected teams so no one's blindsided in the room. At Amplitude that's how the reallocation got approved — I didn't present forty slides of funnel data, I presented one recommendation with the conversion math behind it and the trade-off stated plainly. Analysis earns you the right to a recommendation; the recommendation is what you're actually there to deliver.", "bp": "Lead with the decision + expected impact, not a data tour\nJust enough funnel logic to be credible; frame as a clear choice with the trade-off\nQuantify the stakes (cost of inaction); pre-socialize with affected teams\nAmplitude: one recommendation + the math, not 40 slides", "fu": "How do you handle leadership pushing back on your recommendation?", "grp": "craft"}, {"id": "Q30", "cat": "Q", "q": "Walk me through the Amplitude funnel turnaround end to end.", "rounds": [2, 3], "status": "todo", "st": "Your signature story — they'll probe it hard. Be crisp on the problem, your specific role vs the team, the levers, the result, and what you'd change.", "ai": "Problem: at Amplitude, MQL-to-SQL was stuck at 18% — marketing generated volume, sales rejected most of it, and the two teams blamed each other. I owned marketing ops. (What I did) I audited the funnel in SQL and found two root causes: lead scoring rewarded activity that didn't predict a real opportunity, and routing was slow enough that good leads went cold. I rebuilt the scoring model against what actually converted, tightened routing SLAs in Salesforce, and got sales to co-own the new SQL definition so they trusted and worked the leads. I owned the analysis, the scoring model, and the Salesforce build; RevOps partnered on routing mechanics and sales leadership on the definition. (Result) Conversion went from 18% to 26% over about three quarters with no extra marketing spend, and it became a major input to pipeline. (What I'd change) I'd have brought sales into the definition even earlier — that was the piece that made it stick, and I did it a bit late.", "bp": "Problem: MQL→SQL stuck at 18%, marketing vs sales blame; I owned MOps\nDiagnosed in SQL: scoring rewarded non-predictive activity; routing too slow\nRebuilt scoring vs real conversion; tightened SFDC routing; sales co-owned the SQL def\nResult: 18%→26% in ~3 quarters, no extra spend\nMe: analysis/model/SFDC · Team: RevOps routing, sales definition · Would do: involve sales earlier", "fu": [{"q": "What was YOUR part versus the team's?", "st": "Separate your ownership from the team's cleanly.", "ai": "I owned the SQL audit, the rebuilt scoring model, and the Salesforce implementation. RevOps handled routing mechanics and Sales leadership the definition — the diagnosis and model were mine."}, {"q": "Which lever mattered most — scoring or routing?", "st": "Be decisive — pick one, but show you get the interaction.", "ai": "Scoring drove the bigger share — the old model rewarded activity that didn't predict opportunities — but routing speed compounded it; fixing both is what got us from 18% to 26%."}, {"q": "How did you prove it wasn't just seasonality?", "st": "Name the specific control (YoY / holdout) that rules it out.", "ai": "I compared against the same period the prior year and held the change on a control segment before full rollout, so the lift showed up against the seasonal baseline, not because of it."}], "grp": "experience"}, {"id": "Q41", "cat": "Q", "grp": "experience", "q": "Walk me through your career so far — how did you end up in marketing operations?", "rounds": [1, 2], "status": "todo", "st": "A background question — give a coherent arc, not a chronology. Show the throughline: how each role built toward owning the funnel and the investment decision.", "ai": "I came into marketing ops from the data side. I started at Zendesk as a Marketing Ops Analyst — mostly reporting and campaign operations, which is where I got comfortable in SQL and living in the funnel data. I wanted more ownership, so I moved to Asana as a Marketing Ops Manager and built our first multi-touch attribution model, which started letting me influence where marketing spent. For the last two-and-a-half years I've been Senior Marketing Ops Manager at Amplitude, owning the funnel end to end — that's where I rebuilt lead scoring and routing and took MQL-to-SQL from 18% to 26%. The throughline is that I've steadily moved from reporting the numbers, to modeling them, to using them to make the investment call — which is exactly the strategy-and-ops scope of this role.", "bp": "Data-side entry: Zendesk analyst (reporting, SQL, funnel)\nAsana MOps Manager: built first attribution model, more ownership\nAmplitude Senior: own the funnel; MQL→SQL 18%→26%\nArc: report → model → decide (= this role's scope)", "fu": [{"q": "Which move taught you the most?", "st": "Tie it to the analyst→owner jump.", "ai": "Asana — building the attribution model from scratch forced me to own the data quality and defend a methodology to leadership, which is the jump from analyst to owner."}, {"q": "What made you shift from analyst to owning strategy?", "st": "Show an intrinsic pull toward owning the decision.", "ai": "I got tired of handing insights to someone else to act on. Once I saw my analysis change a budget decision, I wanted to be the one making that call."}]}, {"id": "Q42", "cat": "Q", "grp": "experience", "q": "Tell me about the multi-touch attribution model you built at Asana — how did you approach it?", "rounds": [2, 3], "status": "todo", "st": "A résumé deep-dive — they'll test whether you actually built it. Be concrete on the method, the hard part (data quality), and what it changed.", "ai": "At Asana, marketing couldn't credibly answer 'which channels actually drive pipeline,' so I built our first multi-touch attribution model. I started from the decision it needed to serve — budget allocation — and chose a W-shaped model that credits the touches that actually move someone through the funnel, not just first or last touch. The hard part wasn't the model math; it was data quality — stitching touch data across Marketo and Salesforce with reliable timestamps so the credit was trustworthy. I built it in SQL, validated it against known-good campaigns, and — the lesson that stuck — I was explicit with leadership about where it was directional so no one over-read a decimal. It shifted how we credited two channels and became the basis for the next budget cycle. It's also what taught me to treat attribution as a decision aid, not a truth machine.", "bp": "Problem: couldn't credibly say which channels drove pipeline\nChose W-shaped (credit the touches that move the funnel), tied to the budget decision\nHard part: data quality — stitching Marketo+SFDC touches with clean timestamps\nBuilt in SQL, validated vs known campaigns; framed as directional\nShifted 2 channels' credit → next budget cycle", "fu": [{"q": "What would you do differently building it today?", "st": "One honest improvement — shows growth, not defensiveness.", "ai": "Invest even more up front in the data-quality layer — the model was fine; the pain was always the touch data being messy. I'd also socialize 'this is directional' from day one."}, {"q": "How did you handle stakeholders who wanted exact credit?", "st": "Reframe attribution as directional and decision-useful.", "ai": "I reframed it: the model is for comparing channels to allocate budget, not for exact credit. As long as everyone uses the same model, the relative comparison is what's decision-useful."}]}, {"id": "Q43", "cat": "Q", "grp": "experience", "q": "What did you own at Zendesk, and what did that first role teach you?", "rounds": [1, 2], "status": "todo", "st": "An early-career deep-dive — show foundational skills and self-awareness about what you took from it. Keep it crisp; it's not your headline role.", "ai": "At Zendesk I was a Marketing Ops Analyst — I owned the reporting layer and a lot of campaign operations: the dashboards marketing ran on, keeping the funnel data clean in Marketo and Salesforce, and supporting campaign setup and lead flow. It wasn't glamorous, but it's where I got genuinely fluent in SQL and learned how a marketing funnel actually behaves end to end. The biggest lesson was that clean, trusted data is the foundation for everything — a beautiful dashboard is worthless if marketing and sales don't believe the numbers. That's the instinct I carried into every role since: get the definitions and data quality right first, and the analysis and the decisions follow.", "bp": "Marketing Ops Analyst: reporting + campaign ops\nOwned dashboards, funnel data hygiene (Marketo/SFDC), lead flow\nGot fluent in SQL; learned how the funnel behaves end to end\nLesson: trusted data is the foundation — definitions first, then analysis", "fu": [{"q": "How did that shape how you work now?", "st": "Connect the early lesson to a habit you use today.", "ai": "I always start a project by nailing definitions and data quality before touching analysis — I learned early that a dashboard nobody trusts is worthless, no matter how good the analysis on top."}]}, {"id": "Q31", "cat": "Q", "q": "Tell me about a project that failed or didn't hit its goals.", "rounds": [4], "status": "risk", "st": "RISK — the Asana lead-scoring overhaul that first hurt conversion. Own it: define the miss, take the root cause as yours, spend the ending on what you learned and changed. Don't hide it or blame the tool.", "ai": "(Define) I'd count as a real failure a time I shipped something confident it would help and it made things worse before it got better. (What happened) At Asana I led a lead-scoring overhaul. I rebuilt the model on what I thought predicted quality, but I made two mistakes that were mine: I trained it on too short a window of data, so it overfit to a seasonal spike, and I rolled it out to the whole funnel at once instead of testing it. MQL-to-SQL actually dropped for about six weeks, and sales lost some trust in marketing's leads. (What I changed) I caught it in the data, rolled back to a blend of old and new scoring, and rebuilt properly on a full year of data with a holdout to validate before full rollout — after which conversion recovered and improved. Two things stuck permanently: I never roll out a scoring or routing change without testing on a segment first, and I validate models on enough history to survive seasonality. It's exactly the discipline I used later at Amplitude, and it's why that one worked cleanly.", "bp": "Asana lead-scoring overhaul — MQL→SQL dropped ~6 weeks, sales lost trust\nRoot cause (mine): trained on too-short data (overfit a seasonal spike); rolled out to all at once, no test\nFixed: rolled back to a blend; rebuilt on a full year + holdout before full rollout\nChanged permanently: always test on a segment first; validate on enough history\nUsed that discipline at Amplitude → it worked cleanly", "fu": [{"q": "What would you do differently if you ran it again?", "st": "Name the concrete process change — shows you learned.", "ai": "Test on one segment before a full rollout, and validate the model on a full year of data so it can't overfit a seasonal spike — the two mistakes that caused the drop."}, {"q": "How did you rebuild sales' trust after that?", "st": "Lead with owning it and a fast correction, not excuses.", "ai": "I owned the miss openly, rolled back fast to a blend of old and new scoring, then showed them the rebuilt model validated on a holdout before asking them to work those leads again."}, {"q": "How do you now decide a model is ready to ship?", "st": "State a clear, testable bar — no shipping on faith.", "ai": "It has to beat the current approach on a holdout, on enough history to survive seasonality, and pass a small live test on one segment — no full rollout on faith."}], "grp": "behavioral"}, {"id": "Q32", "cat": "Q", "q": "This role is strategy AND operations — your background reads more operational. How do you operate strategically, not just run the machine?", "rounds": [2, 3], "status": "risk", "st": "RISK — the interviewer may pigeonhole you as execution-only. Reframe with evidence that you already make and defend investment decisions, not just build the plumbing. Don't get defensive; show the strategy work you've already done.", "ai": "It's a fair thing to probe, and the honest answer is that the operational depth is what makes my strategy credible — but I already do the strategy part. The clearest example: at Amplitude the operational task was 'fix the funnel,' but the strategic call was where to invest. I didn't just clean up scoring — I used the funnel economics to recommend that we reallocate budget away from a high-volume, low-converting channel rather than add spend, and I defended that to a VP whose team owned the channel. That's a prioritization decision, not plumbing, and it moved conversion eight points on the same budget. I see operations and strategy as one loop: the ops rigor gives me a funnel I trust, and the trustworthy funnel is what lets me make an investment call leadership will actually act on. What I'm looking for in this role is to have that decision be explicitly mine, at a bigger scale — which is exactly why the strategy-and-ops framing drew me to it.", "bp": "Fair probe — but the ops depth is what makes the strategy credible\nAmplitude: the strategic call was WHERE to invest — reallocate, not add spend\nDefended it to a VP who owned the channel; +8 pts on same budget = a prioritization decision\nOps + strategy are one loop: trusted funnel → an investment call leadership acts on\nWant that decision explicitly mine at bigger scale — why this role", "fu": [{"q": "Give another example of a strategic call you made, not just executed.", "st": "Pick a clear reprioritization/judgment call, not execution.", "ai": "At Asana I argued against raising the MQL bar — my data said routing speed, not lead quality, was the real problem — and proposed we fix routing first. That reprioritization was a judgment call, and it worked."}, {"q": "Where do you think purely operational MOps people fall short?", "st": "Contrast 'runs the machine' vs 'makes the call' — that's your edge.", "ai": "They optimize the machine they're given without asking whether it's pointed at the right thing — great at building the report, but they don't turn it into a 'spend here, not there' recommendation leadership can act on."}], "grp": "craft"}, {"id": "Q33", "cat": "Q", "q": "Tell me about a time you influenced a team without any authority.", "rounds": [4], "status": "todo", "st": "Behavioral (CARL). Core to marketing ops. Influence through evidence and shared goals. Pick a story distinct from the disagreement one.", "ai": "(Context) At Amplitude, getting sales to adopt a new lead-scoring model meant winning over a skeptical sales director who'd been burned by marketing 'quality' promises before — and I had zero authority over his team. (Action) I didn't push it top-down. I brought him the conversion data showing which leads his reps actually closed versus what the old score prioritized, and I let the gap make the case. Then I gave him a real role in shaping the SQL definition so it was ours, not marketing's, and I proposed we pilot it with one of his teams before rolling it out. (Result) The pilot team's conversion improved, he became an advocate, and the model rolled out with sales actually working the leads instead of rejecting them — which is what made the eight-point lift stick. (Learning) Influence without authority is evidence, plus a cheap way to prove it, plus giving the other side genuine ownership.", "bp": "Needed a burned, skeptical sales director to adopt new scoring — no authority\nBrought data on what his reps actually closed vs the old score; let the gap argue\nGave him a real role in the SQL definition; piloted with one team first\nPilot improved → he became an advocate → the lift stuck\nLesson: evidence + a cheap proof + genuine shared ownership", "fu": "What do you do when the data isn't yet on your side?", "grp": "behavioral"}, {"id": "Q34", "cat": "Q", "q": "What do you know about Segment, and how would you think about marketing ops for its business?", "rounds": [2, 3], "status": "todo", "st": "Show homework on Segment (a CDP, now part of Twilio) and a real POV on its funnel challenge (self-serve + enterprise). Confirm specifics before the interview.", "ai": "Segment is a customer data platform — it collects and routes first-party customer data to the tools teams use — and it's part of Twilio now. What makes it interesting for marketing ops is that it runs a hybrid motion: there's a self-serve, product-led path where teams start using it bottom-up, and an enterprise sales-led motion for larger accounts. That means the marketing funnel isn't one clean path — a self-serve signup and an enterprise MQL are completely different animals, and measuring or prioritizing across both without a single distorted number is the real challenge. I'd want to make sure each motion has its own funnel definition and that we're not, say, judging enterprise marketing on self-serve volume. It's also a data-native company, so the bar for measurement rigor is high — which honestly is the appeal. [Confirm the current motion mix and any recent Twilio changes before the interview.]", "bp": "Segment = a CDP (routes first-party customer data), now part of Twilio\nHybrid motion: self-serve/product-led + enterprise sales-led\nMOps challenge: two very different funnels — measure/prioritize without one distorted number\nGive each motion its own funnel definition; high measurement bar (data-native)", "fu": "How would you avoid one motion's metrics distorting the other?", "grp": "company"}, {"id": "Q44", "cat": "Q", "grp": "company", "q": "Who are Segment's main competitors in the CDP space, and how would that shape marketing priorities?", "rounds": [2, 3], "status": "todo", "st": "Show market awareness — name real competitors and translate it into a marketing-ops implication, not just a list.", "ai": "In the CDP space Segment competes with a few clusters — other CDPs like mParticle and Tealium, the 'build it on the warehouse' approach (RudderStack, reverse-ETL tools like Hightouch on Snowflake), and the big suites (Adobe, Salesforce) bundling CDP capability. What that means for marketing ops is that the funnel has to make Segment's differentiation obvious early — developer-friendliness, breadth of integrations, being the trusted first-party data layer — because a large part of the buying committee is really comparing 'buy Segment' vs 'build on our warehouse.' So I'd want the funnel and measurement to surface which segments lean build-vs-buy and prioritize accordingly. [Confirm the current competitive set before the interview.]", "bp": "Clusters: CDPs (mParticle, Tealium) · warehouse/reverse-ETL (RudderStack, Hightouch) · suites (Adobe, Salesforce)\nCore decision is often 'buy Segment vs build on the warehouse'\nMOps implication: funnel must surface differentiation early; segment by build-vs-buy\nConfirm current competitors before the interview", "fu": "Where is Segment most vulnerable competitively?"}, {"id": "Q45", "cat": "Q", "grp": "company", "q": "Segment is part of Twilio now — how do you think that shapes its go-to-market and your role?", "rounds": [2, 3], "status": "todo", "st": "Show you understand the Twilio context and can reason about GTM implications. Don't overclaim — frame it as how you'd think about it.", "ai": "Being part of Twilio changes the go-to-market in a couple of ways I'd want to understand. There's cross-sell — Twilio's communications customers are a natural audience for Segment's data layer, so some of the funnel is probably 'existing Twilio accounts' rather than pure net-new, which is a very different motion (expansion vs acquisition) and would change how I measure and prioritize. There's also positioning — how Segment sits within the broader Twilio story. For marketing ops specifically, I'd want the funnel and attribution to cleanly separate Twilio-sourced pipeline from Segment's own self-serve and sales motions, so we're not crediting or prioritizing the wrong one. [Confirm how integrated the GTM currently is before the interview.]", "bp": "Cross-sell: Twilio comms customers = natural audience (expansion, not just net-new)\nExpansion vs acquisition = a different motion to measure/prioritize\nPositioning within the broader Twilio story\nMOps: funnel/attribution must separate Twilio-sourced vs Segment's own motions", "fu": "How would you avoid double-counting Twilio-sourced pipeline?"}, {"id": "Q46", "cat": "Q", "grp": "company", "q": "What do you see as the biggest growth challenge for a CDP like Segment right now?", "rounds": [3], "status": "todo", "st": "Show a real industry POV, tied to what it means for a marketing-ops role.", "ai": "The biggest challenge I see is the 'build vs buy' pressure. As data warehouses (Snowflake, BigQuery) became the center of gravity and reverse-ETL tools got good, more teams ask whether they need a packaged CDP at all versus assembling it on their warehouse. So the growth challenge is making the value of the packaged product obvious against a credible, cheaper-looking alternative. For marketing ops, that means the funnel has to work harder to demonstrate time-to-value and total cost, and measurement should focus on which segments genuinely convert and stick on the packaged product versus revert to build-your-own. There's also the AI angle — a CDP's clean, unified data is a strong foundation for AI use cases, which could be a real tailwind if positioned well. [Sanity-check current strategy before the interview.]", "bp": "Challenge: warehouse + reverse-ETL make 'build vs buy' real — is a CDP still needed?\nGrowth = prove packaged value vs a credible cheaper alternative\nMOps: funnel must show time-to-value + TCO; measure who sticks vs reverts to build\nAI angle: clean unified data as the foundation for AI = potential tailwind", "fu": "How would you position against 'just build it on Snowflake'?"}, {"id": "Q47", "cat": "Q", "grp": "company", "q": "How would you describe Segment's ideal customer, and what does that mean for the funnel?", "rounds": [2, 3], "status": "todo", "st": "Show you understand who buys and why — and translate it into funnel/segmentation implications for marketing ops.", "ai": "Segment's sweet spot has classically been product-led, data-savvy companies — teams with engineers who want a clean, developer-friendly way to collect and route first-party data, often mid-market to enterprise where the integration breadth pays off. The buying committee is interesting because it spans technical (engineering/data) and business (marketing/growth) stakeholders. For marketing ops that has two implications: first, the funnel should be segmented by motion — a bottoms-up developer signup behaves completely differently from an enterprise, sales-led evaluation, and measuring them together distorts everything; second, content and nurture have to speak to both the technical evaluator and the business buyer. So I'd make sure our funnel definitions and attribution treat those as distinct paths. [Confirm the current ICP framing before the interview.]", "bp": "ICP: product-led, data-savvy teams; engineers wanting clean first-party data; mid-market→enterprise\nBuying committee spans technical (eng/data) + business (marketing/growth)\nMOps 1: segment the funnel by motion (dev signup vs enterprise sales-led)\nMOps 2: nurture speaks to both technical + business buyers", "fu": "How would you tailor the funnel for the technical vs business buyer?"}, {"id": "Q35", "cat": "F", "q": "What are the top priorities for this role in the first six months?", "rounds": [2, 3], "status": "todo", "ai": "(Ask this out loud — a question for them, not one to answer.)"}, {"id": "Q36", "cat": "F", "q": "How does marketing ops partner with Sales and RevOps here — where does ownership sit?", "rounds": [3, 4], "status": "todo", "ai": "(Ask this out loud — a question for them, not one to answer.)"}, {"id": "Q37", "cat": "F", "q": "What does the current martech and reporting stack look like, and what's the biggest pain point?", "rounds": [3], "status": "todo", "ai": "(Ask this out loud — a question for them, not one to answer.)"}, {"id": "Q38", "cat": "F", "q": "How is marketing's success measured at the leadership level — what's the number that matters most?", "rounds": [2], "status": "todo", "ai": "(Ask this out loud — a question for them, not one to answer.)"}, {"id": "Q39", "cat": "F", "q": "How do you measure and prioritize across the self-serve and enterprise motions today?", "rounds": [3], "status": "todo", "ai": "(Ask this out loud — a question for them, not one to answer.)"}, {"id": "Q40", "cat": "F", "q": "What separates a great marketing strategy & ops person from a good one on this team?", "rounds": [2, 4], "status": "todo", "ai": "(Ask this out loud — a question for them, not one to answer.)"}];

/* ---------- persisted edits ---------- */
const SK="iprep_twilio-segment-marketing-strategy-operations-man", K_EDITS=SK+"_edits", K_DONE=SK+"_done", K_LAST=SK+"_last";
const EDITS = (()=>{
  const d = JSON.parse(localStorage.getItem(K_EDITS)||"{}");
  for(const k of ["st","bp","ai","my","qt","fu","rounds","grp","add","del","ord"]) d[k]=d[k]||{};
  return d;
})();
const doneSet = new Set(JSON.parse(localStorage.getItem(K_DONE)||"[]"));
function notifySaved(){
  const el=document.getElementById("savednote");
  if(el) el.textContent="✓ Saved "+new Date().toLocaleTimeString();
}
function persist(){ localStorage.setItem(K_EDITS, JSON.stringify(EDITS)); notifySaved(); }
function saveDone(){ localStorage.setItem(K_DONE, JSON.stringify([...doneSet])); notifySaved(); }
let lastId = localStorage.getItem(K_LAST)||null;
let lastRound = localStorage.getItem(K_LAST+"_round")||null;   // last round the user entered
function touch(id){ lastId=id; localStorage.setItem(K_LAST,id); }
function touchRound(r){ lastRound=String(r); localStorage.setItem(K_LAST+"_round",String(r)); }
function saveF(kind,id,val){
  if(val.trim()) EDITS[kind][id]=val; else delete EDITS[kind][id];
  touch(id); persist();
}
function copyPolish(id, btn){
  const it=findQ(id);
  const mine=(EDITS.my[id]||"").trim();
  const text=mine || effVal("ai",it).trim();
  if(!text){ if(btn){btn.textContent="✍️ Write an answer first";setTimeout(()=>btn.textContent="✨ Copy for AI polish",1800);} return; }
  const prompt="Lightly polish this interview answer. Improve clarity, flow, and word choice, and fix any awkward phrasing — but keep my meaning, my voice, and roughly the same length. Do not add new facts or claims. Return only the polished answer.\n\nQuestion: "+effQ(it)+"\n\nMy answer:\n"+text;
  const done=()=>{ if(btn){btn.textContent="✓ Copied — paste into any AI";setTimeout(()=>btn.textContent="✨ Copy for AI polish",1800);} };
  if(typeof navigator!=="undefined"&&navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(prompt).then(done,()=>fallbackCopy(prompt,done)); }
  else fallbackCopy(prompt,done);
}
function fallbackCopy(txt,cb){ const t=document.createElement("textarea"); t.value=txt;
  t.style.position="fixed"; t.style.opacity="0"; document.body.appendChild(t); t.select();
  try{ document.execCommand("copy"); }catch(e){} document.body.removeChild(t); cb&&cb(); }
function exportEdits(){
  const blob=new Blob([JSON.stringify({done:[...doneSet],...EDITS},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=SK+"_edits.json"; a.click();
}
function exportAll(){
  const lines=["# "+document.title+" — Full Export","","Exported: "+new Date().toISOString().slice(0,16).replace("T"," "),""];
  for(const it of allQ()){
    const g=it.cat==="F"?"Questions to ask":(GRP_LABEL[effGrp(it)]||"");
    lines.push("## "+it.id+" · "+effQ(it));
    lines.push("Rounds: "+effRounds(it).map(r=>"R"+r).join(", ")
      +(g?" | "+g:"")
      +(it.status==="risk"?" | HIGH-RISK":"")
      +(doneSet.has(it.id)?" | MASTERED":""));
    const secs=[["Strategy","st"],["Bullet points","bp"],["AI answer","ai"],["My answer","my"]];
    for(const [name,k] of secs){
      const v=(effVal(k,it)||"").trim();
      if(v){ lines.push("","### "+name,"",v); }
    }
    const fus=fuItems(it);
    if(fus.length){ lines.push("","### Follow-up questions","");
      for(const f of fus){ lines.push("- "+f.q); if(f.ai) lines.push("  "+f.ai.replace(/\n/g," ")); } }
    lines.push("","---","");
  }
  const blob=new Blob([lines.join("\n")],{type:"text/markdown"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=SK+"_full_export.md"; a.click();
}
function importEdits(inp){
  const file=inp.files[0]; if(!file) return;
  file.text().then(t=>{ const d=JSON.parse(t);
    (d.done||[]).forEach(x=>doneSet.add(x));
    for(const k of ["st","bp","ai","my","qt","fu","rounds","grp","add","del","ord"]) Object.assign(EDITS[k], d[k]||{});
    saveDone(); persist(); inp.value=""; render(); });
}

/* ---------- combined list (built-in + custom, minus deleted) ---------- */
function allQ(){
  const customs=Object.entries(EDITS.add).map(([id,c])=>({
    id, cat:c.cat||"A", q:"New question — edit me", rounds:c.rounds||RKEYS.slice(), status:"todo", custom:true, par:c.par}));
  let list=[];
  for(const cat of Object.keys(CATS))
    list=list.concat(DATA.filter(x=>x.cat===cat), customs.filter(x=>x.cat===cat));
  return list.filter(x=>!EDITS.del[x.id]);
}
function findQ(id){ return allQ().find(x=>x.id===id); }
function dispId(it){
  if(!it.custom) return it.id;                       // built-in questions keep their id
  const nums=DATA.filter(x=>x.cat===it.cat).map(x=>parseInt(x.id.slice(1),10)).filter(n=>!isNaN(n));
  const base=nums.length?Math.max.apply(null,nums):0;// after the built-ins in this category
  const customs=allQ().filter(x=>x.custom&&x.cat===it.cat);
  const idx=customs.findIndex(x=>x.id===it.id);
  return it.cat+(base+(idx<0?customs.length:idx)+1);
}
function kids(id){ return allQ().filter(x=>x.par===id); }
// follow-ups can be plain strings OR objects {q,st,ai,bp}; normalize to an array of objects
function fuItems(it){
  var raw=(EDITS.fu[it.id]!==undefined)?EDITS.fu[it.id]:it.fu;
  if(!raw) return [];
  if(typeof raw==="string") return raw.split("\n").map(s=>({q:s.trim()})).filter(x=>x.q);
  if(Array.isArray(raw)) return raw.map(x=> typeof x==="string" ? {q:x.trim()} : {q:(x.q||"").trim(),st:x.st||"",ai:x.ai||"",bp:x.bp||""}).filter(x=>x.q);
  return [];
}
function addQuestion(){
  const cat = catSel==="all" ? "A" : catSel;
  let n=1; while(EDITS.add["N"+n]||EDITS.del["N"+n]) n++;
  const id="N"+n;
  EDITS.add[id]={cat}; persist(); page="q"; detailId=id; render(); window.scrollTo(0,0);
}
function promoteFu(parId, idx){
  const par=findQ(parId); if(!par) return;
  const f=fuItems(par)[idx]; if(!f||!f.q) return;
  const nk=kids(parId).length;               // follow-ups of this parent already promoted
  let n=1; while(EDITS.add["N"+n]||EDITS.del["N"+n]) n++;
  const id="N"+n;
  EDITS.add[id]={cat:par.cat, par:parId};
  EDITS.qt[id]=f.q; EDITS.rounds[id]=effRounds(par).slice(); EDITS.grp[id]=effGrp(par);
  EDITS.ord[id]=effOrd(par)+(nk+1)*0.001;     // sort right after the parent (and after earlier-promoted follow-ups)
  if(f.st) EDITS.st[id]=f.st; if(f.ai) EDITS.ai[id]=f.ai; if(f.bp) EDITS.bp[id]=f.bp;
  persist(); openDetail(id);
}
// tapping a follow-up line: open its card if already prepped, else prep it (make a card) and open
function openFu(parId, idx){
  const par=findQ(parId); if(!par) return;
  const f=fuItems(par)[idx]; if(!f||!f.q) return;
  const existing=kids(parId).find(k=>effQ(k).trim()===f.q);
  if(existing){ openDetail(existing.id); return; }
  promoteFu(parId, idx);
}
function deleteQuestion(id){
  if(!confirm("Delete this question? This cannot be undone.")) return;
  if(EDITS.add[id]) delete EDITS.add[id]; else EDITS.del[id]=true;
  for(const k of ["st","bp","ai","my","qt","fu","rounds","grp"]) delete EDITS[k][id];
  doneSet.delete(id); if(detailId===id) detailId=null;
  saveDone(); persist(); render();
}

/* ---------- effective values (edit overrides > defaults) ---------- */
function effRounds(it){ return EDITS.rounds[it.id] || it.rounds; }
function effQ(it){ return (EDITS.qt[it.id]||"").trim() || it.q; }
function effGrp(it){ var g=(EDITS.grp[it.id]!==undefined)?EDITS.grp[it.id]:(it.grp||""); return GRP_LABEL[g]?g:"experience"; }
function defVal(kind,it){ return kind==="st"?(it.st||""):kind==="ai"?(it.ai||""):kind==="fu"?(it.fu||""):""; }
function effVal(kind,it){ return (it.id in EDITS[kind]) ? EDITS[kind][it.id] : defVal(kind,it); }
function editQ(id,v){ saveF("qt",id,v); }
function setQRound(id,r,checked){
  const it=findQ(id);
  const cur=new Set(effRounds(it));
  checked?cur.add(r):cur.delete(r);
  const arr=[...cur].sort();
  if(arr.join()===it.rounds.join()) delete EDITS.rounds[id]; else EDITS.rounds[id]=arr;
  persist(); render();
}

/* ---------- sidebar ---------- */
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function sbtn(on,click,label,n){
